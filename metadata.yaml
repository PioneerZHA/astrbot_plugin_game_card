name: astrbot_plugin_steam_card
desc: |
  Steam 游戏搜索与链接图卡插件。

  本插件面向群聊中的 Steam 游戏分享场景：用户可以使用 /steam搜索 指令按游戏名查找 Steam 商店结果，也可以直接在群消息中发送 Steam 商店游戏链接，插件会自动识别 appid，读取 Steam 商店详情，并渲染成一张适合聊天转发的图片卡片。

  主要功能：
  1. 支持 /steam搜索 游戏名称，返回多个相似 Steam 游戏及商店链接。
  2. 支持自动识别 store.steampowered.com/app/ 链接并生成游戏图卡。
  3. 支持中文搜索词通过当前大模型扩展英文搜索候选，提高中文别名、俗称、译名的搜索命中率。
  4. 支持配置 Steam 商店语言和地区代码，用于控制游戏详情、价格和本地化文本。
  5. 支持 Playwright Chromium 渲染 HTML 模板并截图，也可配置系统 Chrome/Edge 路径作为渲染浏览器。
  6. 支持内置 HTML 模板切换，默认使用杂志短评风格模板。
  7. 支持导入用户自定义 HTML/Jinja2 模板，自定义模板可读取游戏名称、简介、价格、截图、类型、平台、开发商、发行商、水印等数据。
  8. 支持开启或关闭图片水印，并自定义水印文案。

  适合用于游戏群、好友群、频道机器人等场景，让 Steam 链接不再只是裸链接，而是自动生成更直观的游戏介绍图。
